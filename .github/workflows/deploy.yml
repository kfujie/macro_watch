name: Deploy dashboard to GitHub Pages

# Builds a fresh data.json (Python) + the static site (Vite) and publishes it.
# Runs on every push to main, weekly for fresh data, and on manual dispatch.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 23 * * *" # daily 23:00 UTC (after US cash close; ~08:00 JST next day)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (Python)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Generate data.json (fetch fresh sources)
        # MoF/Yahoo can be flaky; the loaders degrade gracefully (NaN columns)
        # rather than fail the build.
        run: uv run python -m macro_watch.web_export --refresh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        working-directory: web
        env:
          VITE_BASE: /macro_watch/ # project-site subpath
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
